databases:
  - name: lms-db
    databaseName: lms_database
    user: lms_user
    plan: free

services:
  - type: web
    name: ai-lms
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn lms_core.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
