{% extends 'base.html' %}

{% block title %}Register - AI LMS{% endblock %}

{% block body %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="#2563eb">
                <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/>
            </svg>
        </div>
        
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Start your learning journey today</p>
        
        <form id="register-form">
            <div class="form-error" style="display:none;margin-bottom:1rem;"></div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label" for="first_name">First Name</label>
                    <input type="text" id="first_name" class="form-input" placeholder="John" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="last_name">Last Name</label>
                    <input type="text" id="last_name" class="form-input" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="8">
                <span class="form-help">At least 8 characters</span>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" class="form-input" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="role">I want to</label>
                <select id="role" class="form-select">
                    <option value="student">Learn (Student)</option>
                    <option value="instructor">Teach (Instructor)</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            Already have an account? <a href="/auth/login/">Sign in</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        Pages.initRegister();
    });
</script>
{% endblock %}
