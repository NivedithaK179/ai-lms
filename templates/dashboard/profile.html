{% extends 'base_dashboard.html' %}

{% block title %}Profile - AI LMS{% endblock %}

{% block content %}
<h1 class="mb-3">My Profile</h1>

<div class="card" style="max-width:600px;">
    <div class="card-body">
        <form id="profile-form">
            <div style="text-align:center;margin-bottom:2rem;">
                <div class="header-user-avatar" style="width:80px;height:80px;font-size:2rem;margin:0 auto;">
                    {{ request.user.first_name|slice:":1"|upper }}
                </div>
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-input" value="{{ request.user.first_name }}" name="first_name">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-input" value="{{ request.user.last_name }}" name="last_name">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" value="{{ request.user.email }}" disabled>
                <span class="form-help">Email cannot be changed</span>
            </div>
            
            <div class="form-group">
                <label class="form-label">Role</label>
                <input type="text" class="form-input" value="{{ request.user.role|title }}" disabled>
            </div>
            
            <div class="form-group">
                <label class="form-label">Bio</label>
                <textarea class="form-textarea" name="bio" placeholder="Tell us about yourself...">{{ request.user.bio }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
    </div>
</div>

<div class="card mt-3" style="max-width:600px;">
    <div class="card-header">
        <h3 style="margin:0;">Change Password</h3>
    </div>
    <div class="card-body">
        <form id="password-form">
            <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" name="old_password" required>
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" name="new_password" required minlength="8">
            </div>
            <button type="submit" class="btn btn-secondary">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Profile form
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const { response } = await API.put('/auth/profile/', data);
            if (response.ok) {
                UI.showAlert('Profile updated!', 'success');
            } else {
                UI.showAlert('Failed to update profile', 'danger');
            }
        });
        
        // Password form
        document.getElementById('password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            const { response } = await API.post('/auth/password/change/', data);
            if (response.ok) {
                UI.showAlert('Password updated!', 'success');
                e.target.reset();
            } else {
                UI.showAlert('Failed to update password', 'danger');
            }
        });
    });
</script>
{% endblock %}
